{% extends "base.html" %}
{% block content %}

<h3>Edit Voucher</h3>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="voucher_no" value="{{ voucher.voucher_no }}" class="form-control mb-2">

    <input type="date" name="voucher_date" value="{{ voucher.voucher_date }}" class="form-control mb-2">

    <input type="text" name="remarks" value="{{ voucher.remarks }}" class="form-control mb-2">

    <button class="btn btn-success">Update</button>
</form>

{% endblock %}
